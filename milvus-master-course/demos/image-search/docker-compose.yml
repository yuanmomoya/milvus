services:
  image-api:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./:/app
    ports:
      - '8002:8002'
    environment:
      MILVUS_URI: http://host.docker.internal:19530
    extra_hosts:
      - host.docker.internal:host-gateway
    command: sh -c "pip install --no-cache-dir -r requirements.txt && uvicorn app:app --host 0.0.0.0 --port 8002"
